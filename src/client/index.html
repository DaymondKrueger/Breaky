<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Breaky</title>
		<meta name="viewport" content="minimal-ui, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
		<meta name="mobile-web-app-capable" content="yes">
		<link rel="shortcut icon" href="res/menu/favicon.ico" />
        <link rel="icon" type="image/ico" href="res/menu/favicon.ico" />
		<link href="https://fonts.googleapis.com/css?family=Titillium+Web" rel="stylesheet">
	</head>
	<body oncontextmenu="return false;">
        <!-- Menu UI -->
        <div id="main-menu">
		    <div class="background"></div>
            
            <div class="menu-wrapper">
                <div id="menu-content">
                    <!-- Left side of main menu -->
                    <div class="container">
                        <div class="user-container">
                            <img src="res/menu/avatar_guest.png" draggable="false" class="avatar">
                            <div class="input-bar">
                                <input type="text" name="game-username" id="game-username" placeholder="Enter Username">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18" class="icon"><defs><style>#icons_User{fill: #20D7E7;fill-rule: evenodd;}</style></defs><path class="cls-1" id="icons_User" d="M14.384,18H3.679C-0.015,18,.07,15.757.07,15.757v-1.8c0-3.643,1.395-3.886,1.395-3.886,1.219-.409,3.124,1.356,3.124,1.356A7.376,7.376,0,0,0,9.031,12.7a7.376,7.376,0,0,0,4.443-1.27s1.9-1.765,3.124-1.356c0,0,1.395.243,1.395,3.886v1.8S18.078,18,14.384,18ZM9,0A5,5,0,1,1,4,5,5,5,0,0,1,9,0Z"/></svg>
                            </div>
                        </div>
                        <div class="play-game-container">
                            <div class="play-game-underlay"></div>
                            <div class="play-game" id="play-game">Play Game!</div>
                        </div>
                        <div class="divider"></div>
                        <!-- Everything underneath divider on left side of mainmenu -->
                    </div>
                    <div class="divider vert"></div>
                    <!-- Right side of main menu -->
                    <div class="container">
                        Right side
                    </div>
                </div>

                <div id="lobby-content">
                    <div class="container">
                        <h2 id="lobby-title">Waiting for players</h2>
                        <ul id="lobby-player-list"></ul>
                        <div id="lobby-countdown"></div>
                        <button id="ready-btn">Ready up!</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="game-container">
            <div id="hud-ping">Ping: </div>
            <div id="hud-leaderboard">
                <div class="main-container">
                    <div class="container health">
                        <div class="health-bar-container">
                            <div class="top">
                                <div class="team-name">Blue team</div>
                                <div id="blue-team-health-percent" class="health-percent">100%</div>
                            </div>
                            <div id="blue-team-bar-fill" class="bar-fill blue"></div>
                        </div>
                    </div>
                    <div class="container health">
                        <div class="health-bar-container">
                            <div class="top">
                                <div class="team-name">Red team</div>
                                <div id="red-team-health-percent" class="health-percent">100%</div>
                            </div>
                            <div id="red-team-bar-fill" class="bar-fill red"></div>
                        </div>
                    </div>
                    <div class="container">
                        <div class="scores-container">
                            <div class="score-container">
                                <div id="score-1-name" class="score">1st Guest4809</div>
                                <div id="score-1-amt" class="score">5</div>
                            </div>
                            <div class="score-container">
                                <div id="score-2-name" class="score">2nd Guest3574</div>
                                <div id="score-2-amt" class="score">5</div>
                            </div>
                            <div class="score-container">
                                <div id="score-3-name" class="score">3rd</div>
                                <div id="score-3-amt" class="score">0</div>
                            </div>
                            <div class="score-container">
                                <div id="score-4-name" class="score">4th</div>
                                <div id="score-4-amt" class="score">0</div>
                            </div>
                        </div>
                        <div class="timer-container">
                            <div></div>
                            <div id="match-timer">5:00</div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="hud-powerups"></div>
        </div>

        <div id="game-over">
            <div class="container">
                <h2 id="game-over-title">Game over</h2>
                <p id="game-over-reason"></p>
                <button id="rematch-btn">Rematch</button>
                <p id="rematch-status"></p>
            </div>
        </div>
	</body>
</html>
