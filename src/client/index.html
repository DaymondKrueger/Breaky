<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Breaky</title>
		<meta name="viewport" content="minimal-ui, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
		<meta name="mobile-web-app-capable" content="yes">
		<link rel="manifest" href="manifest.json">
		<link rel="shortcut icon" href="res/menu/favicon.ico" />
        <link rel="icon" type="image/ico" href="res/menu/favicon.ico" />
		<link href="https://fonts.googleapis.com/css?family=Titillium+Web" rel="stylesheet">
	</head>
	<body oncontextmenu="return false;">
        <!-- Menu UI -->
        <div id="main-menu">
		    <div class="background"></div>
            
            <div id="menu-content">
                <!-- Left side of main menu -->
                <div class="container">
                    <div class="user-container">
                        <img src="res/menu/avatar_guest.png" draggable="false" class="avatar">
                        <div class="input-bar">
                            <input type="text" name="game-username" id="game-username" placeholder="Enter Username">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18" class="icon"><defs><style>#icons_User{fill: #20D7E7;fill-rule: evenodd;}</style></defs><path class="cls-1" id="icons_User" d="M14.384,18H3.679C-0.015,18,.07,15.757.07,15.757v-1.8c0-3.643,1.395-3.886,1.395-3.886,1.219-.409,3.124,1.356,3.124,1.356A7.376,7.376,0,0,0,9.031,12.7a7.376,7.376,0,0,0,4.443-1.27s1.9-1.765,3.124-1.356c0,0,1.395.243,1.395,3.886v1.8S18.078,18,14.384,18ZM9,0A5,5,0,1,1,4,5,5,5,0,0,1,9,0Z"/></svg>
                        </div>
                    </div>
                    <div class="play-game-container">
                        <div class="play-game-underlay"></div>
                        <div class="play-game" id="play-game">Play Game!</div>
                    </div>
                    <div class="divider"></div>
                    <!-- Everything underneath divider on left side of mainmenu -->
                </div>
                <div class="divider vert"></div>
                <!-- Right side of main menu -->
                <div class="container">
                    Right side
                </div>
            </div>
        </div>

        <!-- Game UI -->
        <div id="ui-overlay" class="hidden">
            <div id="hud">
                <span id="score-display">Score: 0</span>
            </div>
        </div>
        <div id="game-container"></div>
	</body>
</html>
